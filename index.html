<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloth Market — Gumti Square, Faisalabad</title>
    <style>
        :root {
            --cotton:#f6efe3; --cotton-2:#eee2cd; --thread-gold:#b9852f;
            --maroon:#6b1f2a; --maroon-deep:#4a1019; --ink:#2a201a;
            --fade:#7a6c5a; --line:#d9c8a8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--cotton); color: var(--ink); font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; }

        /* Navbar & Logo */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--cotton); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--line); }
        .logo { height: 50px; }
        .logo img { height: 100%; width: auto; object-fit: contain; cursor: pointer; }
        .nav-links a { text-decoration: none; color: var(--ink); margin-left: 20px; font-size: 14px; text-transform: uppercase; font-weight: 600; }

        /* Full Video Slider */
        .slider-container { width: 100%; height: 500px; background: #000; position: relative; overflow: hidden; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide video { 
          width: 100%; 
          height: 100%; 
          object-fit: cover; /* "contain" ki jagah "cover" kardein */
          object-position: center; /* Video ko center mein rakhega */
}

        /* Products Grid */
        .section-padding { padding: 60px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid var(--line); padding: 15px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--thread-gold); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; }

        /* Contact Section */
        .contact { background: var(--maroon-deep); color: white; padding: 60px 5%; text-align: center; }
        .btn { display: inline-block; padding: 12px 30px; background: var(--thread-gold); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* Media Queries */
        @media (max-width: 768px) { .nav-links { display: none; } .slider-container { height: 300px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
    <div class="nav-links">
        <a href="#home">Home</a><a href="#products">Collection</a><a href="#contact">Contact</a>
    </div>
</nav>

<div class="slider-container" id="home">
    <div class="slide active">
        <video autoplay muted loop playsinline><source src="videos/1.mp4" style="width:100%" type="video/mp4"></video>
    </div>
    
</div>

<section class="section-padding" id="products">
    <h2 style="text-align:center; margin-bottom:40px; color:var(--maroon-deep);">Latest Arrivals</h2>
    <div class="grid">
        <div class="card"><img src="images/1.jpeg" alt="Lawn"><h3>Premium Lawn</h3></div>
        <div class="card"><img src="images/2.jpeg" alt="Cotton"><h3>Cotton Silk</h3></div>
        <div class="card"><img src="images/3.jpeg" alt="Chiffon"><h3>Designer Chiffon</h3></div>
    </div>
</section>

<section class="contact" id="contact">
    <h2>Visit Cloth Market</h2>
    <p>Gumti Square, Rail Bazar Rd, Kesari Gate, Faisalabad</p>
    <a href="https://wa.me/923026688226" class="btn">WhatsApp Us Now</a>
</section>

<footer>
    <p style="text-align:center; padding:20px; color:var(--fade); font-size:12px;">
        &copy; 2026 Cloth Market — Gumti Square, Faisalabad.
    </p>
</footer>

<script>
    let slides = document.querySelectorAll(".slide");
    let index = 0;
    function nextSlide() {
        slides[index].classList.remove("active");
        slides[index].querySelector('video').pause();
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
        slides[index].querySelector('video').play();
    }
    setInterval(nextSlide, 5000);
</script>

</body>
</html>
